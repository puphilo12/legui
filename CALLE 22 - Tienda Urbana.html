document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c6b5246f-1944-44a3-b978-8129d31042ce\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"37c5c2de-2c92-4992-a31c-6ac169c335f6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"61d17983-4c6c-4b5c-b0c7-eaaffc1cd004\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"908ba25e-49ed-42a3-9aa5-694c049959f6\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{background:#0A0A0B}\n  body{-webkit-font-smoothing:antialiased}\n  image-slot{display:block}\n  ::selection{background:#1B3FE0;color:#fff}\n  @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}\n  @keyframes marqueeR{from{transform:translateX(-50%)}to{transform:translateX(0)}}\n  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}\n  @keyframes spinSlow{from{transform:rotate(0)}to{transform:rotate(360deg)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div ref=\"{{ setRoot }}\" data-screen-label=\"Tienda Urbana\" style=\"background:#0A0A0B;color:#F4F4F5;font-family:'Space Grotesk',system-ui,sans-serif;overflow-x:hidden;min-height:100vh;position:relative\">\n\n  <!-- ===== HEADER ===== -->\n  <header style=\"position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:rgba(10,10,11,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.08)\">\n    <a href=\"#top\" style=\"font-family:'Anton',sans-serif;font-size:24px;letter-spacing:.04em;color:#F4F4F5;text-decoration:none;line-height:1\">CALLE<span style=\"color:#1B3FE0\">.<\u002Fspan>22<\u002Fa>\n    <nav style=\"display:flex;gap:26px;align-items:center;font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase\">\n      <a href=\"#nuevos\" style=\"color:rgba(244,244,245,.78);text-decoration:none\" style-hover=\"color:#fff\">Nuevos<\u002Fa>\n      <a href=\"#colecciones\" style=\"color:rgba(244,244,245,.78);text-decoration:none\" style-hover=\"color:#fff\">Colecciones<\u002Fa>\n      <a href=\"#lookbook\" style=\"color:rgba(244,244,245,.78);text-decoration:none\" style-hover=\"color:#fff\">Lookbook<\u002Fa>\n      <a href=\"#ofertas\" style=\"color:rgba(244,244,245,.78);text-decoration:none\" style-hover=\"color:#fff\">Drops<\u002Fa>\n    <\u002Fnav>\n    <div style=\"display:flex;align-items:center;gap:14px\">\n      <button onclick=\"{{ toggleAdmin }}\" style=\"font-family:'Space Grotesk';font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:rgba(244,244,245,.7);border:1px solid rgba(255,255,255,.18);padding:9px 14px;border-radius:999px;cursor:pointer\" style-hover=\"border-color:#1B3FE0;color:#fff\">Admin<\u002Fbutton>\n      <div style=\"display:flex;align-items:center;gap:8px;background:#1B3FE0;color:#fff;font-size:12px;font-weight:700;letter-spacing:.06em;padding:9px 16px;border-radius:999px;cursor:pointer\">CARRITO · {{ cartCount }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== HERO ===== -->\n  <section id=\"top\" onmousemove=\"{{ onHeroMove }}\" onmouseleave=\"{{ onHeroLeave }}\" style=\"position:relative;display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center;max-width:1280px;margin:0 auto;padding:70px 28px 90px;min-height:78vh\">\n    <div style=\"position:relative;z-index:2\">\n      <div style=\"display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#1B3FE0;margin-bottom:22px\">\n        <span style=\"width:8px;height:8px;background:#1B3FE0;display:inline-block\"><\u002Fspan>Temporada 26 · En vivo\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(48px,7vw,104px);line-height:.92;letter-spacing:.005em;text-transform:uppercase;margin:0\">\n        Ropa y<br>zapatillas<br>para la <span style=\"color:#1B3FE0\">calle<\u002Fspan>\n      <\u002Fh1>\n      <p style=\"max-width:420px;margin:26px 0 32px;font-size:16px;line-height:1.6;color:rgba(244,244,245,.62)\">Streetwear sin reglas. Drops semanales, ediciones limitadas y siluetas que mueven la ciudad. Hecho para los que no esperan turno.<\u002Fp>\n      <div style=\"display:flex;gap:14px;flex-wrap:wrap\">\n        <a href=\"#nuevos\" style=\"background:#1B3FE0;color:#fff;font-weight:700;font-size:14px;letter-spacing:.04em;text-transform:uppercase;padding:16px 30px;border-radius:999px;text-decoration:none\" style-hover=\"background:#2a4dff\">Comprar ahora<\u002Fa>\n        <a href=\"#lookbook\" style=\"background:transparent;color:#fff;font-weight:700;font-size:14px;letter-spacing:.04em;text-transform:uppercase;padding:16px 30px;border-radius:999px;text-decoration:none;border:1px solid rgba(255,255,255,.22)\" style-hover=\"border-color:#fff\">Ver lookbook<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:34px;margin-top:46px\">\n        <div><div style=\"font-family:'Anton';font-size:30px;line-height:1\">240+<\u002Fdiv><div style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,244,245,.5);margin-top:4px\">Modelos<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Anton';font-size:30px;line-height:1\">48h<\u002Fdiv><div style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,244,245,.5);margin-top:4px\">Envío<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Anton';font-size:30px;line-height:1\">∞<\u002Fdiv><div style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,244,245,.5);margin-top:4px\">Actitud<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:relative;perspective:1100px;z-index:1\">\n      <div style=\"position:absolute;top:-30px;right:-10px;width:140px;height:140px;background:#1B3FE0;border-radius:50%;filter:blur(2px);opacity:.9;animation:floaty 6s ease-in-out infinite;z-index:0\"><\u002Fdiv>\n      <div style=\"position:absolute;bottom:-26px;left:-26px;width:90px;height:90px;border:2px solid #1B3FE0;animation:spinSlow 14s linear infinite;z-index:0\"><\u002Fdiv>\n      <div ref=\"{{ setHeroCard }}\" style=\"position:relative;transition:transform .25s ease-out;transform-style:preserve-3d;will-change:transform;z-index:1\">\n        <image-slot id=\"hero-main\" style=\"width:100%;height:520px\" shape=\"rounded\" radius=\"18\" placeholder=\"Arrastra tu foto principal aquí\"><\u002Fimage-slot>\n        <div style=\"position:absolute;bottom:16px;left:16px;background:#0A0A0B;border:1px solid rgba(255,255,255,.14);padding:10px 16px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transform:translateZ(60px)\">Nuevo drop ↗<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== MARQUEE ===== -->\n  <div style=\"background:#1B3FE0;color:#fff;padding:14px 0;overflow:hidden;white-space:nowrap;border-top:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.1)\">\n    <div style=\"display:inline-flex;gap:0;animation:marquee 26s linear infinite;will-change:transform\">\n      <span style=\"font-family:'Anton';font-size:26px;letter-spacing:.04em;text-transform:uppercase;padding-right:0\">{{ marqueeText }}{{ marqueeText }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== NUEVOS PRODUCTOS ===== -->\n  <section id=\"nuevos\" style=\"max-width:1280px;margin:0 auto;padding:90px 28px 40px\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s,transform .7s;display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:36px;flex-wrap:wrap;gap:16px\">\n      <h2 style=\"font-family:'Anton';font-size:clamp(32px,4.5vw,60px);line-height:.95;text-transform:uppercase;margin:0\">Nuevos<br>productos<\u002Fh2>\n      <p style=\"max-width:300px;font-size:14px;color:rgba(244,244,245,.55);line-height:1.6\">Lo último en zapatillas y prendas. Stock limitado — cuando se va, se va.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px\">\n      <sc-for list=\"{{ products }}\" as=\"p\" hint-placeholder-count=\"6\">\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s,transform .7s;background:#101012;border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden\" style-hover=\"border-color:rgba(27,63,224,.6)\">\n          <div style=\"position:relative;overflow:hidden\">\n            <image-slot id=\"{{ p.slotId }}\" style=\"width:100%;height:300px;transition:transform .5s ease\" placeholder=\"{{ p.placeholder }}\"><\u002Fimage-slot>\n            <div style=\"position:absolute;top:12px;left:12px;background:#1B3FE0;color:#fff;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;border-radius:999px\">{{ p.tag }}<\u002Fdiv>\n            <sc-if value=\"{{ p.soldout }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:absolute;inset:0;background:rgba(10,10,11,.62);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)\">\n                <span style=\"font-family:'Anton';font-size:30px;letter-spacing:.06em;text-transform:uppercase;color:#fff;border:2px solid #fff;padding:6px 18px;transform:rotate(-6deg)\">Agotado<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"padding:18px 18px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px\">\n            <div>\n              <div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(244,244,245,.45);margin-bottom:6px\">{{ p.category }}<\u002Fdiv>\n              <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:17px;line-height:1.2\">{{ p.name }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-family:'Anton';font-size:22px;color:#1B3FE0;white-space:nowrap\">{{ p.priceLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== COLECCIONES ===== -->\n  <section id=\"colecciones\" style=\"max-width:1280px;margin:0 auto;padding:70px 28px\">\n    <h2 data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s,transform .7s;font-family:'Anton';font-size:clamp(32px,4.5vw,60px);text-transform:uppercase;margin:0 0 32px\">Colecciones<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1.4fr 1fr;grid-template-rows:repeat(2,260px);gap:18px\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s,transform .7s;position:relative;grid-row:1 / span 2;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08)\">\n        <image-slot id=\"col-zapas\" style=\"width:100%;height:100%\" placeholder=\"Zapatillas — arrastra foto\"><\u002Fimage-slot>\n        <div style=\"position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,11,.85),transparent 55%);pointer-events:none\"><\u002Fdiv>\n        <div style=\"position:absolute;left:22px;bottom:22px;pointer-events:none\">\n          <div style=\"font-family:'Anton';font-size:40px;text-transform:uppercase;line-height:.95\">Zapatillas<\u002Fdiv>\n          <div style=\"font-size:13px;color:rgba(244,244,245,.7);margin-top:4px\">82 modelos →<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s .08s,transform .7s .08s;position:relative;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08)\">\n        <image-slot id=\"col-hoodies\" style=\"width:100%;height:100%\" placeholder=\"Hoodies &amp; Ropa\"><\u002Fimage-slot>\n        <div style=\"position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,11,.82),transparent 55%);pointer-events:none\"><\u002Fdiv>\n        <div style=\"position:absolute;left:22px;bottom:20px;pointer-events:none\"><div style=\"font-family:'Anton';font-size:30px;text-transform:uppercase\">Hoodies &amp; Ropa<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s .16s,transform .7s .16s;position:relative;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:#1B3FE0\">\n        <image-slot id=\"col-acc\" style=\"width:100%;height:100%\" placeholder=\"Accesorios\"><\u002Fimage-slot>\n        <div style=\"position:absolute;inset:0;background:linear-gradient(to top,rgba(13,30,120,.8),transparent 55%);pointer-events:none\"><\u002Fdiv>\n        <div style=\"position:absolute;left:22px;bottom:20px;pointer-events:none\"><div style=\"font-family:'Anton';font-size:30px;text-transform:uppercase\">Accesorios<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== LOOKBOOK ===== -->\n  <section id=\"lookbook\" style=\"background:#101012;border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);padding:80px 0\">\n    <div style=\"max-width:1280px;margin:0 auto;padding:0 28px\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s,transform .7s;display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:34px;flex-wrap:wrap;gap:16px\">\n        <h2 style=\"font-family:'Anton';font-size:clamp(32px,4.5vw,60px);text-transform:uppercase;margin:0\">Lookbook 26<\u002Fh2>\n        <p style=\"max-width:320px;font-size:14px;color:rgba(244,244,245,.55);line-height:1.6\">La calle es la pasarela. Arrastra tus fotos a cada hueco para armar el editorial.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:200px;gap:14px\">\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s,transform .7s;grid-row:span 2;border-radius:14px;overflow:hidden\"><image-slot id=\"lb1\" style=\"width:100%;height:100%\" placeholder=\"Look 01\"><\u002Fimage-slot><\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s .06s,transform .7s .06s;border-radius:14px;overflow:hidden\"><image-slot id=\"lb2\" style=\"width:100%;height:100%\" placeholder=\"Look 02\"><\u002Fimage-slot><\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s .1s,transform .7s .1s;border-radius:14px;overflow:hidden\"><image-slot id=\"lb3\" style=\"width:100%;height:100%\" placeholder=\"Look 03\"><\u002Fimage-slot><\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s .14s,transform .7s .14s;grid-row:span 2;border-radius:14px;overflow:hidden\"><image-slot id=\"lb4\" style=\"width:100%;height:100%\" placeholder=\"Look 04\"><\u002Fimage-slot><\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s .12s,transform .7s .12s;grid-column:span 2;border-radius:14px;overflow:hidden\"><image-slot id=\"lb5\" style=\"width:100%;height:100%\" placeholder=\"Look 05\"><\u002Fimage-slot><\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s .18s,transform .7s .18s;border-radius:14px;overflow:hidden\"><image-slot id=\"lb6\" style=\"width:100%;height:100%\" placeholder=\"Look 06\"><\u002Fimage-slot><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== OFERTAS / DROP ===== -->\n  <section id=\"ofertas\" style=\"background:#1B3FE0;color:#fff;padding:0;overflow:hidden;position:relative\">\n    <div style=\"padding:14px 0;overflow:hidden;white-space:nowrap;border-bottom:1px solid rgba(255,255,255,.2)\">\n      <div style=\"display:inline-flex;animation:marqueeR 22s linear infinite\">\n        <span style=\"font-family:'Anton';font-size:22px;letter-spacing:.05em;text-transform:uppercase\">{{ dropText }}{{ dropText }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1280px;margin:0 auto;padding:70px 28px;display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s,transform .7s\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.85;margin-bottom:16px\">Drop semanal · Viernes 20:00<\u002Fdiv>\n        <h2 style=\"font-family:'Anton';font-size:clamp(40px,6vw,86px);line-height:.92;text-transform:uppercase;margin:0\">Hasta -40%<br>en el drop<\u002Fh2>\n        <p style=\"max-width:380px;margin:22px 0 28px;font-size:15px;line-height:1.6;opacity:.9\">Suscríbete y recibe el código antes que nadie. Sin spam, solo fuego.<\u002Fp>\n        <div style=\"display:flex;gap:0;max-width:420px;background:#0A0A0B;border-radius:999px;padding:6px;align-items:center\">\n          <input placeholder=\"tu@email.com\" style=\"flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:'Space Grotesk';font-size:14px;padding:12px 18px\">\n          <button style=\"background:#1B3FE0;color:#fff;border:none;font-family:'Space Grotesk';font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:13px 22px;border-radius:999px;cursor:pointer\">Avísame<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .7s .1s,transform .7s .1s;display:flex;justify-content:center;gap:14px\">\n        <div style=\"text-align:center\"><div style=\"font-family:'Anton';font-size:clamp(44px,7vw,92px);line-height:1;background:#0A0A0B;border-radius:14px;padding:14px 8px;min-width:96px\">{{ cd.d }}<\u002Fdiv><div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:8px\">Días<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align:center\"><div style=\"font-family:'Anton';font-size:clamp(44px,7vw,92px);line-height:1;background:#0A0A0B;border-radius:14px;padding:14px 8px;min-width:96px\">{{ cd.h }}<\u002Fdiv><div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:8px\">Horas<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align:center\"><div style=\"font-family:'Anton';font-size:clamp(44px,7vw,92px);line-height:1;background:#0A0A0B;border-radius:14px;padding:14px 8px;min-width:96px\">{{ cd.m }}<\u002Fdiv><div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:8px\">Min<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"max-width:1280px;margin:0 auto;padding:70px 28px 40px\">\n    <div style=\"display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:40px\">\n      <div style=\"max-width:340px\">\n        <div style=\"font-family:'Anton';font-size:34px;letter-spacing:.03em\">CALLE<span style=\"color:#1B3FE0\">.<\u002Fspan>22<\u002Fdiv>\n        <p style=\"font-size:14px;color:rgba(244,244,245,.55);line-height:1.6;margin-top:12px\">Tienda de ropa y zapatillas urbanas. Hecho en la ciudad, para la ciudad.<\u002Fp>\n        <div style=\"display:flex;gap:10px;margin-top:20px\">\n          <a href=\"#top\" style=\"width:42px;height:42px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.18);border-radius:50%;color:#fff;text-decoration:none;font-size:12px;font-weight:700\" style-hover=\"background:#1B3FE0;border-color:#1B3FE0\">IG<\u002Fa>\n          <a href=\"#top\" style=\"width:42px;height:42px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.18);border-radius:50%;color:#fff;text-decoration:none;font-size:12px;font-weight:700\" style-hover=\"background:#1B3FE0;border-color:#1B3FE0\">TT<\u002Fa>\n          <a href=\"#top\" style=\"width:42px;height:42px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.18);border-radius:50%;color:#fff;text-decoration:none;font-size:12px;font-weight:700\" style-hover=\"background:#1B3FE0;border-color:#1B3FE0\">YT<\u002Fa>\n          <a href=\"#top\" style=\"width:42px;height:42px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.18);border-radius:50%;color:#fff;text-decoration:none;font-size:12px;font-weight:700\" style-hover=\"background:#1B3FE0;border-color:#1B3FE0\">X<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:60px;flex-wrap:wrap\">\n        <div>\n          <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,244,245,.45);margin-bottom:14px\">Tienda<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px\"><a href=\"#nuevos\" style=\"color:rgba(244,244,245,.8);text-decoration:none\" style-hover=\"color:#1B3FE0\">Nuevos<\u002Fa><a href=\"#colecciones\" style=\"color:rgba(244,244,245,.8);text-decoration:none\" style-hover=\"color:#1B3FE0\">Colecciones<\u002Fa><a href=\"#ofertas\" style=\"color:rgba(244,244,245,.8);text-decoration:none\" style-hover=\"color:#1B3FE0\">Drops<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,244,245,.45);margin-bottom:14px\">Ayuda<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px\"><a href=\"#top\" style=\"color:rgba(244,244,245,.8);text-decoration:none\" style-hover=\"color:#1B3FE0\">Envíos<\u002Fa><a href=\"#top\" style=\"color:rgba(244,244,245,.8);text-decoration:none\" style-hover=\"color:#1B3FE0\">Cambios<\u002Fa><a href=\"#top\" style=\"color:rgba(244,244,245,.8);text-decoration:none\" style-hover=\"color:#1B3FE0\">Contacto<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-top:20px;font-size:12px;color:rgba(244,244,245,.4)\">\n      <span>© 2026 CALLE.22 — Todos los derechos reservados<\u002Fspan>\n      <span>Hecho en la calle ✸<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ===== ADMIN PANEL ===== -->\n  <sc-if value=\"{{ adminOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.55);backdrop-filter:blur(3px)\" onclick=\"{{ toggleAdmin }}\"><\u002Fdiv>\n  <\u002Fsc-if>\n  <div style=\"position:fixed;top:0;right:0;height:100vh;width:380px;max-width:92vw;z-index:91;background:#0E0E10;border-left:1px solid rgba(255,255,255,.1);transform:{{ adminTransform }};transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:22px 22px 16px;border-bottom:1px solid rgba(255,255,255,.08)\">\n      <div>\n        <div style=\"font-family:'Anton';font-size:22px;text-transform:uppercase\">Panel admin<\u002Fdiv>\n        <div style=\"font-size:12px;color:rgba(244,244,245,.5)\">Edita productos en vivo<\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ toggleAdmin }}\" style=\"width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:transparent;color:#fff;font-size:16px;cursor:pointer\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"flex:1;overflow-y:auto;padding:18px 22px\">\n      <sc-for list=\"{{ products }}\" as=\"p\" hint-placeholder-count=\"3\">\n        <div style=\"background:#161618;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;margin-bottom:14px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px\">\n            <span style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,244,245,.45)\">{{ p.category }}<\u002Fspan>\n            <button data-id=\"{{ p.id }}\" onclick=\"{{ onAdminToggle }}\" style=\"font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:999px;cursor:pointer;border:1px solid {{ p.soldoutBorder }};background:{{ p.soldoutBg }};color:{{ p.soldoutColor }}\">{{ p.soldoutLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n          <label style=\"display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(244,244,245,.4);margin-bottom:5px\">Nombre<\u002Flabel>\n          <input value=\"{{ p.name }}\" data-id=\"{{ p.id }}\" data-field=\"name\" onchange=\"{{ onAdminInput }}\" style=\"width:100%;background:#0A0A0B;border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;font-family:'Space Grotesk';font-size:14px;padding:10px 12px;margin-bottom:12px;outline:none\">\n          <div style=\"display:flex;gap:10px\">\n            <div style=\"flex:1\"><label style=\"display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(244,244,245,.4);margin-bottom:5px\">Precio €<\u002Flabel><input type=\"number\" value=\"{{ p.price }}\" data-id=\"{{ p.id }}\" data-field=\"price\" onchange=\"{{ onAdminInput }}\" style=\"width:100%;background:#0A0A0B;border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;font-family:'Space Grotesk';font-size:14px;padding:10px 12px;outline:none\"><\u002Fdiv>\n            <div style=\"flex:1\"><label style=\"display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(244,244,245,.4);margin-bottom:5px\">Etiqueta<\u002Flabel><input value=\"{{ p.tag }}\" data-id=\"{{ p.id }}\" data-field=\"tag\" onchange=\"{{ onAdminInput }}\" style=\"width:100%;background:#0A0A0B;border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;font-family:'Space Grotesk';font-size:14px;padding:10px 12px;outline:none\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <button onclick=\"{{ addProduct }}\" style=\"width:100%;background:transparent;border:1px dashed rgba(255,255,255,.25);border-radius:12px;color:rgba(244,244,245,.7);font-family:'Space Grotesk';font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:14px;cursor:pointer\" style-hover=\"border-color:#1B3FE0;color:#fff\">+ Añadir producto<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"padding:16px 22px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:10px\">\n      <button onclick=\"{{ resetProducts }}\" style=\"flex:1;background:transparent;border:1px solid rgba(255,255,255,.18);border-radius:10px;color:rgba(244,244,245,.7);font-family:'Space Grotesk';font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:12px;cursor:pointer\">Resetear<\u002Fbutton>\n      <button onclick=\"{{ toggleAdmin }}\" style=\"flex:1.4;background:#1B3FE0;border:none;border-radius:10px;color:#fff;font-family:'Space Grotesk';font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:12px;cursor:pointer\">Listo<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.defaults = [\n      {id:'p1', slotId:'prod-1', name:'Runner 2099', category:'Zapatillas', price:129, tag:'Nuevo', soldout:false, placeholder:'Zapatilla 01'},\n      {id:'p2', slotId:'prod-2', name:'Static Oversize Hoodie', category:'Ropa', price:79, tag:'Top', soldout:false, placeholder:'Hoodie 01'},\n      {id:'p3', slotId:'prod-3', name:'Court Mono', category:'Zapatillas', price:99, tag:'Drop', soldout:true, placeholder:'Zapatilla 02'},\n      {id:'p4', slotId:'prod-4', name:'Tactical Cargo', category:'Ropa', price:89, tag:'Nuevo', soldout:false, placeholder:'Pantalón 01'},\n      {id:'p5', slotId:'prod-5', name:'Blue Bolt', category:'Zapatillas', price:139, tag:'Edición', soldout:false, placeholder:'Zapatilla 03'},\n      {id:'p6', slotId:'prod-6', name:'Noise Graphic Tee', category:'Ropa', price:39, tag:'Top', soldout:false, placeholder:'Camiseta 01'}\n    ];\n    let saved = null;\n    try { saved = JSON.parse(localStorage.getItem('calle22_products')||'null'); } catch(e){}\n    this.state = {\n      products: (Array.isArray(saved) && saved.length) ? saved : this.defaults.map(p=>({...p})),\n      adminOpen: false\n    };\n  }\n\n  componentDidMount(){\n    this._reveal();\n    this._t1 = setTimeout(()=>this._reveal(), 350);\n  }\n  componentWillUnmount(){ if(this._io) this._io.disconnect(); clearTimeout(this._t1); }\n\n  _reveal(){\n    if(!this.root) return;\n    if(!this._io){\n      this._io = new IntersectionObserver((ents)=>{\n        ents.forEach(en=>{\n          if(en.isIntersecting){\n            en.target.style.opacity='1';\n            en.target.style.transform='none';\n            this._io.unobserve(en.target);\n          }\n        });\n      }, {threshold:.1, rootMargin:'0px 0px -8% 0px'});\n    }\n    this.root.querySelectorAll('[data-reveal]').forEach(el=>this._io.observe(el));\n  }\n\n  persist(products){\n    try { localStorage.setItem('calle22_products', JSON.stringify(products)); } catch(e){}\n  }\n\n  setProduct(id, field, value){\n    this.setState(s=>{\n      const products = s.products.map(p=> p.id===id ? {...p, [field]:value} : p);\n      this.persist(products);\n      return { products };\n    });\n  }\n\n  onAdminInput = (e)=>{\n    const id = e.target.dataset.id;\n    const field = e.target.dataset.field;\n    let val = e.target.value;\n    if(field==='price') val = Number(val) || 0;\n    this.setProduct(id, field, val);\n  }\n\n  onAdminToggle = (e)=>{\n    const id = e.currentTarget.dataset.id;\n    const p = this.state.products.find(x=>x.id===id);\n    if(p) this.setProduct(id, 'soldout', !p.soldout);\n  }\n\n  addProduct = ()=>{\n    this.setState(s=>{\n      const n = s.products.length + 1;\n      const np = {id:'p'+Date.now(), slotId:'prod-new-'+Date.now(), name:'Nuevo producto', category:'Zapatillas', price:0, tag:'Nuevo', soldout:false, placeholder:'Producto '+n};\n      const products = [...s.products, np];\n      this.persist(products);\n      return { products };\n    });\n  }\n\n  resetProducts = ()=>{\n    const products = this.defaults.map(p=>({...p}));\n    this.persist(products);\n    this.setState({ products });\n  }\n\n  toggleAdmin = ()=> this.setState(s=>({ adminOpen: !s.adminOpen }));\n\n  setRoot = (el)=>{ this.root = el; if(el) this._reveal(); }\n  setHeroCard = (el)=>{ this.heroCard = el; }\n\n  onHeroMove = (e)=>{\n    if(!this.heroCard) return;\n    const r = this.heroCard.getBoundingClientRect();\n    const x = (e.clientX - r.left)/r.width - .5;\n    const y = (e.clientY - r.top)/r.height - .5;\n    this.heroCard.style.transform = `rotateY(${x*14}deg) rotateX(${-y*14}deg) translateZ(0)`;\n  }\n  onHeroLeave = ()=>{\n    if(this.heroCard) this.heroCard.style.transform = 'rotateY(0deg) rotateX(0deg)';\n  }\n\n  renderVals(){\n    const products = this.state.products.map(p=>({\n      ...p,\n      priceLabel: '€'+p.price,\n      soldoutLabel: p.soldout ? 'Agotado' : 'Disponible',\n      soldoutBg: p.soldout ? 'rgba(27,63,224,.15)' : 'transparent',\n      soldoutBorder: p.soldout ? '#1B3FE0' : 'rgba(255,255,255,.18)',\n      soldoutColor: p.soldout ? '#6f8bff' : 'rgba(244,244,245,.7)'\n    }));\n    const cartCount = products.filter(p=>!p.soldout).length;\n\n    // countdown to next Friday 20:00\n    const now = new Date();\n    const target = new Date(now);\n    const day = now.getDay();\n    let add = (5 - day + 7) % 7;\n    target.setDate(now.getDate()+add);\n    target.setHours(20,0,0,0);\n    if(target <= now) target.setDate(target.getDate()+7);\n    let diff = Math.max(0, target - now);\n    const d = Math.floor(diff/86400000); diff -= d*86400000;\n    const h = Math.floor(diff/3600000); diff -= h*3600000;\n    const m = Math.floor(diff/60000);\n    const pad = (x)=> String(x).padStart(2,'0');\n\n    return {\n      products,\n      cartCount,\n      adminOpen: this.state.adminOpen,\n      adminTransform: this.state.adminOpen ? 'translateX(0)' : 'translateX(100%)',\n      toggleAdmin: this.toggleAdmin,\n      onAdminInput: this.onAdminInput,\n      onAdminToggle: this.onAdminToggle,\n      addProduct: this.addProduct,\n      resetProducts: this.resetProducts,\n      setRoot: this.setRoot,\n      setHeroCard: this.setHeroCard,\n      onHeroMove: this.onHeroMove,\n      onHeroLeave: this.onHeroLeave,\n      marqueeText: 'NUEVO DROP ✸ ENVÍO GRATIS +50€ ✸ EDICIONES LIMITADAS ✸ STREETWEAR ✸ CALLE.22 ✸ ',\n      dropText: 'VIERNES 20:00 ✸ HASTA -40% ✸ SOLO 100 UNIDADES ✸ NO TE DUERMAS ✸ ',\n      cd: { d: pad(d), h: pad(h), m: pad(m) }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
